name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run build script
        run: python build.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitsuneresource-${{ github.run_number }}
          path: dist/kitsuneresource.exe
          retention-days: 7

      - name: Delete previous dev release (if exists)
        run: |
          gh release delete dev --yes --cleanup-tag 2>$null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        run: |
          $stamp = Get-Date -Format "yyyy-MM-dd HH:mm"
          gh release create dev dist/kitsuneresource.exe `
            --title "Dev Build ($stamp UTC)" `
            --notes "Automated build from commit ${{ github.sha }}" `
            --prerelease `
            --target ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}