name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: kitsuneresource.exe
            label: windows-x86_64
          - os: ubuntu-latest
            artifact: kitsuneresource
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: kitsuneresource
            label: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run build script
        run: python build.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: kr-${{ github.run_number }}-${{ matrix.label }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7

  dev-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Delete previous dev release (if exists)
        run: gh release delete dev --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        run: |
          stamp=$(date -u +"%Y-%m-%d %H:%M")
          gh release create dev \
            --title "Dev Build ($stamp UTC)" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --prerelease \
            --target ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename assets
        run: |
          cp "dist-all/kr-${{ github.run_number }}-windows-x86_64/kitsuneresource.exe" dist-all/kitsuneresource-windows-x86_64.exe
          cp "dist-all/kr-${{ github.run_number }}-linux-x86_64/kitsuneresource"       dist-all/kitsuneresource-linux-x86_64
          cp "dist-all/kr-${{ github.run_number }}-linux-arm64/kitsuneresource"        dist-all/kitsuneresource-linux-arm64

      - name: Upload release assets
        run: |
          gh release upload dev --clobber \
            "dist-all/kitsuneresource-windows-x86_64.exe#KitsuneResource (Windows x86_64)" \
            "dist-all/kitsuneresource-linux-x86_64#KitsuneResource (Linux x86_64)" \
            "dist-all/kitsuneresource-linux-arm64#KitsuneResource (Linux arm64)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}