name: Release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: kitsuneresource.exe
            label: windows-x86_64
          - os: ubuntu-latest
            artifact: kitsuneresource
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: kitsuneresource
            label: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run build script
        run: python build.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: kr-release-${{ matrix.label }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Create stable release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "KitsuneResource v${{ steps.version.outputs.version }}" \
            --target ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename assets
        run: |
          cp "dist-all/kr-release-windows-x86_64/kitsuneresource.exe" dist-all/kitsuneresource-windows-x86_64.exe
          cp "dist-all/kr-release-linux-x86_64/kitsuneresource"       dist-all/kitsuneresource-linux-x86_64
          cp "dist-all/kr-release-linux-arm64/kitsuneresource"        dist-all/kitsuneresource-linux-arm64

      - name: Upload release assets
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" --clobber \
            "dist-all/kitsuneresource-windows-x86_64.exe#KitsuneResource (Windows x86_64)" \
            "dist-all/kitsuneresource-linux-x86_64#KitsuneResource (Linux x86_64)" \
            "dist-all/kitsuneresource-linux-arm64#KitsuneResource (Linux arm64)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}